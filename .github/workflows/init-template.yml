name: Template Init

on:
  push:
    branches:
      - main

jobs:
  init:
    name: Initialize from template
    # Run only on the first push to a new repository created from this template
    if: github.repository != 'shuymn/go-template' && github.event.before == '0000000000000000000000000000000000000000'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check if template init is needed
        id: check
        run: |
          if [ -f .taskfiles/template.yml ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Task
        if: steps.check.outputs.needed == 'true'
        uses: shuymn/github-actions/.github/actions/setup-task@9d0c3f02ca6721c933307a596120abd9864b0783

      - name: Run template init
        if: steps.check.outputs.needed == 'true'
        run: task template:init

      - name: Commit and push
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: initialize from template"
          git push
