colors: true
no_tty: false

pre-commit:
  parallel: false
  piped: true

  commands:
    fmt:
      glob: "*.go"
      run: task fmt -- {staged_files}
      stage_fixed: true
    lint:
      glob: "*.go"
      run: task lint -- {staged_files}
    build:
      glob: "*.go"
      run: task build

  skip:
    - merge: true
    - rebase: true
